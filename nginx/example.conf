    server_name app2.seudominio.com.br;

    ssl_certificate     /etc/ssl/certs/seudominio.com.br.crt;
    ssl_certificate_key /etc/ssl/private/seudominio.com.br.key;

    root  /var/www/app2/public;
    index index.php;

    auth_request        /auth-check;
    error_page 401    = @redirect_to_login;

    location = /auth-check {
        internal;
        proxy_pass              https://auth.seudominio.com.br/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Cookie $http_cookie;
    }

    location @redirect_to_login {

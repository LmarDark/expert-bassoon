}


# =============================================================================
# APP LIVRE — app3.seudominio.com.br  (sem autenticação)
# =============================================================================
server {
    listen 443 ssl;
    server_name app3.seudominio.com.br;

    ssl_certificate     /etc/ssl/certs/seudominio.com.br.crt;
    ssl_certificate_key /etc/ssl/private/seudominio.com.br.key;

    root  /var/www/app3/public;
    index index.php;

    # Sem auth_request — acesso livre

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 80;
    server_name app3.seudominio.com.br;
    return 301 https://$host$request_uri;
}

# =============================================================================
# Exemplo de configuração Nginx para SSO com SESSION_DOMAIN=.seudominio.com.br
#
# Arquitetura:
#   auth.seudominio.com.br  → este autenticador (Laravel)
#   app1.seudominio.com.br  → aplicação protegida (passa pelo autenticador)
#   app2.seudominio.com.br  → aplicação protegida (passa pelo autenticador)
#   app3.seudominio.com.br  → aplicação livre (sem autenticação)
#
# Como funciona:
#   1. O browser envia o cookie de sessão (seudominio.com.br) em todas as
#      requisições para *.seudominio.com.br
#   2. O nginx usa `auth_request` nas apps protegidas: antes de servir
#      qualquer recurso, faz uma subrequisição interna para
#      auth.seudominio.com.br/auth/check repassando o cookie
#   3. O autenticador responde 200 (sessão válida) ou 401 (não autenticado)
#   4. Em caso de 401, o nginx redireciona para o login com return_to
#
# Pré-requisito no Laravel (autenticador):
#   Criar uma rota GET /auth/check que retorne:
#     - 200 se Auth::check() for true
#     - 401 se não autenticado
#   Exemplo:
#     Route::get('/auth/check', fn() => auth()->check()
#         ? response()->noContent()          // 200
#         : response()->noContent(401)       // 401
#     );
#
# Requer o módulo: ngx_http_auth_request_module (padrão no nginx >= 1.5.4)
# =============================================================================


# =============================================================================
# AUTENTICADOR — auth.seudominio.com.br
# =============================================================================
server {
    listen 443 ssl;
    server_name auth.seudominio.com.br;

    ssl_certificate     /etc/ssl/certs/seudominio.com.br.crt;
    ssl_certificate_key /etc/ssl/private/seudominio.com.br.key;

    root  /var/www/auth/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 80;
    server_name auth.seudominio.com.br;
    return 301 https://$host$request_uri;
}


# =============================================================================
# APP PROTEGIDA 1 — app1.seudominio.com.br
# =============================================================================
server {
    listen 443 ssl;
    server_name app1.seudominio.com.br;

    ssl_certificate     /etc/ssl/certs/seudominio.com.br.crt;
    ssl_certificate_key /etc/ssl/private/seudominio.com.br.key;

    root  /var/www/app1/public;
    index index.php;

    # Valida sessão antes de qualquer recurso
    auth_request        /auth-check;
    error_page 401    = @redirect_to_login;

    # Subrequisição interna → autenticador
    location = /auth-check {
        internal;
        proxy_pass              https://auth.seudominio.com.br/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        # Repassa o cookie de sessão compartilhado (.seudominio.com.br)
        proxy_set_header        Cookie $http_cookie;
    }

    # Redireciona para o login com a URL de retorno
    location @redirect_to_login {
        return 302 https://auth.seudominio.com.br/login?return_to=https://$host$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 80;
    server_name app1.seudominio.com.br;
    return 301 https://$host$request_uri;
}


# =============================================================================
# APP PROTEGIDA 2 — app2.seudominio.com.br
# =============================================================================
